version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      DEBUG: "false"
      CHROMA_PERSIST_DIR: /app/backend/database/chroma
    volumes:
      - ./backend:/app/backend
    working_dir: /app/backend

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    ports:
      - "5173:4173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  chroma_data:
